name: KICOWASCO CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-django
          
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Run Tests
        env:
          DJANGO_SETTINGS_MODULE: kicowasco.settings
        run: |
          pytest # Runs your unit and integration tests [cite: 302]

  deploy:
    needs: test-and-lint # Only deploy if tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        # Assuming you deploy to Render.com [cite: 304]
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}